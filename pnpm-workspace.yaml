packageExtensions:
  "@codecov/rollup-plugin":
    peerDependenciesMeta:
      rollup:
        optional: true

configDependencies:
  pacquet: "^0.11.10"

enableGlobalVirtualStore: true

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "@oxlint/*"
  - "@vitest/*"
  - "@vue/*"
  - oxc-config-hope
  - oxfmt
  - oxlint
  - vitest
  - vue

trustPolicy: no-downgrade

trustPolicyExclude:
  # babel
  - semver@6.3.1
  # node types
  - undici-types@6.21.0
